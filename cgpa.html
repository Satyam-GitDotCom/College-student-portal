<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGPA Calculator — GCE</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--p:#1a3faa;--pl:#2d5be3;--acc:#f59e0b;--bg:#f0f4ff;--surf:#fff;--txt:#0f1b3d;--muted:#6b7280;--border:#e2e8f0;--rad:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hind',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
.topbar{background:var(--p);color:white;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.topbar a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;}
.topbar a:hover{color:white;}
.logo{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;}
.hero-strip{background:linear-gradient(135deg,#1a3faa,#0e7aff);color:white;padding:40px 28px;text-align:center;}
.hero-strip h1{font-family:'Baloo 2',cursive;font-size:36px;font-weight:800;margin-bottom:8px;}
.hero-strip p{opacity:.85;font-size:16px;}
.container{max-width:900px;margin:0 auto;padding:32px 20px;}
.tabs{display:flex;gap:8px;margin-bottom:28px;background:var(--surf);padding:6px;border-radius:var(--rad);box-shadow:0 2px 12px rgba(26,63,170,.08);}
.tab{flex:1;padding:12px;border:none;background:transparent;border-radius:10px;cursor:pointer;font-family:'Baloo 2',cursive;font-size:15px;font-weight:700;color:var(--muted);transition:all .2s;}
.tab.active{background:var(--p);color:white;box-shadow:0 4px 14px rgba(26,63,170,.3);}
.panel{display:none;animation:fadeIn .3s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surf);border-radius:var(--rad);padding:28px;box-shadow:0 4px 20px rgba(26,63,170,.08);margin-bottom:20px;border:1px solid var(--border);}
.card h2{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;color:var(--p);margin-bottom:18px;}
.semester-block{border:1.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;position:relative;}
.sem-title{font-family:'Baloo 2',cursive;font-weight:700;color:var(--p);margin-bottom:14px;font-size:16px;display:flex;justify-content:space-between;align-items:center;}
.subject-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;margin-bottom:10px;align-items:center;}
.subject-row input,.subject-row select{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Hind',sans-serif;font-size:14px;color:var(--txt);background:var(--bg);transition:border .2s;}
.subject-row input:focus,.subject-row select:focus{outline:none;border-color:var(--p);}
.label-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;margin-bottom:8px;}
.label-row span{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:0 12px;}
.del-btn{background:#fee2e2;border:none;color:#ef4444;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.del-btn:hover{background:#fecaca;}
.add-sub-btn{background:var(--bg);border:1.5px dashed var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;width:100%;margin-top:4px;}
.add-sub-btn:hover{border-color:var(--p);color:var(--p);}
.btn-row{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;}
.btn{padding:12px 28px;border-radius:50px;border:none;font-family:'Baloo 2',cursive;font-size:15px;font-weight:700;cursor:pointer;transition:all .25s;}
.btn-primary{background:var(--p);color:white;box-shadow:0 4px 14px rgba(26,63,170,.3);}
.btn-primary:hover{background:var(--pl);transform:translateY(-1px);}
.btn-outline{background:white;color:var(--p);border:2px solid var(--p);}
.btn-outline:hover{background:var(--bg);}
.btn-green{background:#10b981;color:white;}
.btn-green:hover{background:#059669;}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-top:20px;}
.result-box{background:linear-gradient(135deg,var(--p),var(--pl));color:white;border-radius:var(--rad);padding:20px;text-align:center;}
.result-box.green{background:linear-gradient(135deg,#10b981,#059669);}
.result-box.orange{background:linear-gradient(135deg,#f59e0b,#d97706);}
.result-box.red{background:linear-gradient(135deg,#ef4444,#dc2626);}
.result-num{font-family:'Baloo 2',cursive;font-size:36px;font-weight:800;margin-bottom:4px;}
.result-label{font-size:12px;opacity:.85;font-weight:600;}
.eligibility-list{margin-top:20px;}
.elig-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;margin-bottom:8px;font-size:14px;font-weight:500;}
.elig-item.pass{background:#d1fae5;color:#065f46;}
.elig-item.fail{background:#fee2e2;color:#991b1b;}
.elig-item.warn{background:#fef3c7;color:#92400e;}
.add-sem-btn{background:var(--p);color:white;border:none;padding:12px 24px;border-radius:10px;cursor:pointer;font-family:'Baloo 2',cursive;font-size:15px;font-weight:700;transition:all .2s;margin-bottom:16px;}
.add-sem-btn:hover{background:var(--pl);}
/* Grade colors */
.grade-O{color:#10b981;font-weight:700;}
.grade-A{color:#3b82f6;font-weight:700;}
.grade-B{color:#f59e0b;font-weight:700;}
.grade-C,.grade-D{color:#ef4444;font-weight:700;}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo">🎓 GCE Tools</span>
  <a href="index.html">← Back to Main Site</a>
</div>
<div class="hero-strip">
  <h1>📊 CGPA Calculator</h1>
  <p>Calculate your SGPA, CGPA, percentage & check placement/scholarship eligibility</p>
</div>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('sgpa')">📘 SGPA (Single Semester)</button>
    <button class="tab" onclick="switchTab('cgpa')">📚 CGPA (All Semesters)</button>
    <button class="tab" onclick="switchTab('convert')">🔄 Grade Converter</button>
  </div>

  <!-- SGPA PANEL -->
  <div class="panel active" id="panel-sgpa">
    <div class="card">
      <h2>Calculate SGPA</h2>
      <div class="label-row">
        <span>Subject Name</span><span>Credits</span><span>Grade</span><span></span>
      </div>
      <div id="sgpaSubjects">
        <div class="subject-row">
          <input placeholder="e.g. Data Structures" />
          <input type="number" placeholder="4" min="1" max="6" />
          <select>
            <option value="10">O (Outstanding)</option>
            <option value="9">A+ (Excellent)</option>
            <option value="8" selected>A (Very Good)</option>
            <option value="7">B+ (Good)</option>
            <option value="6">B (Above Avg)</option>
            <option value="5">C (Average)</option>
            <option value="4">D (Pass)</option>
            <option value="0">F (Fail)</option>
          </select>
          <button class="del-btn" onclick="delRow(this)">✕</button>
        </div>
      </div>
      <button class="add-sub-btn" onclick="addSgpaRow()">+ Add Subject</button>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="calcSgpa()">Calculate SGPA</button>
        <button class="btn btn-outline" onclick="resetSgpa()">Reset</button>
      </div>
      <div id="sgpaResult" style="display:none">
        <div class="result-grid" id="sgpaResultGrid"></div>
        <div class="eligibility-list" id="sgpaElig"></div>
      </div>
    </div>
  </div>

  <!-- CGPA PANEL -->
  <div class="panel" id="panel-cgpa">
    <div class="card">
      <h2>Calculate CGPA (All Semesters)</h2>
      <div id="semesters"></div>
      <button class="add-sem-btn" onclick="addSemester()">+ Add Semester</button>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="calcCgpa()">Calculate CGPA</button>
        <button class="btn btn-outline" onclick="initSemesters()">Reset</button>
      </div>
      <div id="cgpaResult" style="display:none">
        <div class="result-grid" id="cgpaResultGrid"></div>
        <div class="eligibility-list" id="cgpaElig"></div>
      </div>
    </div>
  </div>

  <!-- CONVERTER PANEL -->
  <div class="panel" id="panel-convert">
    <div class="card">
      <h2>Grade / Percentage Converter</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
        <div>
          <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;">CGPA to Percentage</label>
          <input id="cgpaInput" type="number" step="0.01" min="0" max="10" placeholder="Enter CGPA (e.g. 7.5)" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:'Hind',sans-serif;background:var(--bg);color:var(--txt);" oninput="convertCgpa()">
          <div id="cgpaToPercent" style="margin-top:10px;font-family:'Baloo 2',cursive;font-size:22px;color:var(--p);font-weight:800;"></div>
        </div>
        <div>
          <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;">Percentage to CGPA</label>
          <input id="percentInput" type="number" step="0.1" min="0" max="100" placeholder="Enter % (e.g. 72)" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:'Hind',sans-serif;background:var(--bg);color:var(--txt);" oninput="convertPercent()">
          <div id="percentToCgpa" style="margin-top:10px;font-family:'Baloo 2',cursive;font-size:22px;color:var(--p);font-weight:800;"></div>
        </div>
      </div>
      <h2 style="margin-top:8px;">Grade Point Reference</h2>
      <table style="width:100%;border-collapse:collapse;margin-top:12px;font-size:14px;">
        <thead><tr style="background:var(--p);color:white;">
          <th style="padding:10px 14px;border-radius:8px 0 0 0;text-align:left;">Grade</th>
          <th style="padding:10px 14px;text-align:left;">Points</th>
          <th style="padding:10px 14px;text-align:left;">Range (%)</th>
          <th style="padding:10px 14px;border-radius:0 8px 0 0;text-align:left;">Remark</th>
        </tr></thead>
        <tbody id="gradeTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const gradeData=[
  {g:'O (Outstanding)',p:10,range:'90-100',r:'Exceptional'},
  {g:'A+ (Excellent)',p:9,range:'80-89',r:'Excellent'},
  {g:'A (Very Good)',p:8,range:'70-79',r:'Very Good'},
  {g:'B+ (Good)',p:7,range:'60-69',r:'Good'},
  {g:'B (Above Average)',p:6,range:'50-59',r:'Above Average'},
  {g:'C (Average)',p:5,range:'45-49',r:'Average'},
  {g:'D (Pass)',p:4,range:'40-44',r:'Pass'},
  {g:'F (Fail)',p:0,range:'<40',r:'Fail'},
];

// Init grade table
const tb=document.getElementById('gradeTable');
gradeData.forEach((d,i)=>{
  tb.innerHTML+=`<tr style="background:${i%2?'var(--bg)':'white'}">
    <td style="padding:10px 14px;font-weight:600">${d.g}</td>
    <td style="padding:10px 14px;color:var(--p);font-weight:700">${d.p}</td>
    <td style="padding:10px 14px">${d.range}</td>
    <td style="padding:10px 14px;color:var(--muted)">${d.r}</td>
  </tr>`;
});

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['sgpa','cgpa','convert'][i]===id);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

function gradeSelect(){
  return `<select>
    <option value="10">O (Outstanding)</option>
    <option value="9">A+ (Excellent)</option>
    <option value="8" selected>A (Very Good)</option>
    <option value="7">B+ (Good)</option>
    <option value="6">B (Above Avg)</option>
    <option value="5">C (Average)</option>
    <option value="4">D (Pass)</option>
    <option value="0">F (Fail)</option>
  </select>`;
}

function addSgpaRow(){
  const d=document.createElement('div');
  d.className='subject-row';
  d.innerHTML=`<input placeholder="Subject name"/><input type="number" placeholder="4" min="1" max="6"/>${gradeSelect()}<button class="del-btn" onclick="delRow(this)">✕</button>`;
  document.getElementById('sgpaSubjects').appendChild(d);
}

function delRow(btn){
  const rows=btn.closest('#sgpaSubjects, .semester-subjects');
  if(rows && rows.querySelectorAll('.subject-row').length>1) btn.closest('.subject-row').remove();
}

function resetSgpa(){
  document.getElementById('sgpaSubjects').innerHTML=`<div class="subject-row"><input placeholder="e.g. Data Structures"/><input type="number" placeholder="4" min="1" max="6"/>${gradeSelect()}<button class="del-btn" onclick="delRow(this)">✕</button></div>`;
  document.getElementById('sgpaResult').style.display='none';
}

function calcSgpa(){
  const rows=document.querySelectorAll('#sgpaSubjects .subject-row');
  let totalPoints=0,totalCredits=0,backlogs=0;
  rows.forEach(r=>{
    const cr=parseFloat(r.querySelectorAll('input')[1].value)||0;
    const gp=parseFloat(r.querySelector('select').value)||0;
    totalPoints+=cr*gp;
    totalCredits+=cr;
    if(gp===0)backlogs++;
  });
  if(!totalCredits){alert('Please add subjects with credits!');return;}
  const sgpa=(totalPoints/totalCredits).toFixed(2);
  const pct=((sgpa-0.75)*10).toFixed(1);
  const grade=sgpa>=9?'O':sgpa>=8?'A+':sgpa>=7?'A':sgpa>=6?'B+':sgpa>=5?'B':sgpa>=4?'C':'F';

  document.getElementById('sgpaResultGrid').innerHTML=`
    <div class="result-box"><div class="result-num">${sgpa}</div><div class="result-label">SGPA</div></div>
    <div class="result-box orange"><div class="result-num">${pct}%</div><div class="result-label">Percentage</div></div>
    <div class="result-box ${backlogs>0?'red':'green'}"><div class="result-num">${backlogs}</div><div class="result-label">Backlogs</div></div>
    <div class="result-box" style="background:linear-gradient(135deg,#7c3aed,#5b21b6)"><div class="result-num">${grade}</div><div class="result-label">Overall Grade</div></div>
  `;
  const elig=document.getElementById('sgpaElig');
  elig.innerHTML='<p style="font-weight:700;margin-bottom:10px;font-family:Baloo 2,cursive;">Eligibility Check:</p>';
  [
    {label:'TCS/Wipro Placement (CGPA ≥ 6.5)',ok:sgpa>=6.5},
    {label:'Infosys Placement (CGPA ≥ 6.0)',ok:sgpa>=6.0},
    {label:'PMS Scholarship Eligible (Pass)',ok:backlogs===0},
    {label:'Merit Scholarship (SGPA ≥ 8.0)',ok:sgpa>=8.0},
    {label:'No Active Backlogs',ok:backlogs===0},
  ].forEach(e=>{
    elig.innerHTML+=`<div class="elig-item ${e.ok?'pass':'fail'}">${e.ok?'✅':'❌'} ${e.label}</div>`;
  });
  document.getElementById('sgpaResult').style.display='block';
}

// CGPA Multi-semester
let semCount=0;
function initSemesters(){
  semCount=0;
  document.getElementById('semesters').innerHTML='';
  document.getElementById('cgpaResult').style.display='none';
  addSemester();addSemester();
}

function addSemester(){
  semCount++;
  const div=document.createElement('div');
  div.className='semester-block';
  div.id='sem-'+semCount;
  div.innerHTML=`<div class="sem-title">Semester ${semCount} <button class="del-btn" onclick="document.getElementById('sem-${semCount}').remove()" style="font-size:12px;width:auto;padding:4px 10px;border-radius:6px;">Remove</button></div>
  <div class="label-row"><span>Subject</span><span>Credits</span><span>Grade</span><span></span></div>
  <div class="semester-subjects">
    <div class="subject-row"><input placeholder="Subject"/><input type="number" placeholder="4" min="1" max="6"/>${gradeSelect()}<button class="del-btn" onclick="delRow(this)">✕</button></div>
  </div>
  <button class="add-sub-btn" onclick="addSemRow(this)">+ Add Subject</button>`;
  document.getElementById('semesters').appendChild(div);
}

function addSemRow(btn){
  const container=btn.previousElementSibling;
  const d=document.createElement('div');
  d.className='subject-row';
  d.innerHTML=`<input placeholder="Subject"/><input type="number" placeholder="4" min="1" max="6"/>${gradeSelect()}<button class="del-btn" onclick="delRow(this)">✕</button>`;
  container.appendChild(d);
}

function calcCgpa(){
  const sems=document.querySelectorAll('.semester-block');
  if(!sems.length){alert('Add at least one semester!');return;}
  let allPoints=0,allCredits=0,totalBacklogs=0,semSgpas=[];
  sems.forEach(sem=>{
    let sp=0,sc=0;
    sem.querySelectorAll('.subject-row').forEach(r=>{
      const cr=parseFloat(r.querySelectorAll('input')[1].value)||0;
      const gp=parseFloat(r.querySelector('select').value)||0;
      sp+=cr*gp;sc+=cr;
      if(gp===0)totalBacklogs++;
    });
    if(sc>0){allPoints+=sp;allCredits+=sc;semSgpas.push((sp/sc).toFixed(2));}
  });
  if(!allCredits){alert('Please fill in credits!');return;}
  const cgpa=(allPoints/allCredits).toFixed(2);
  const pct=((cgpa-0.75)*10).toFixed(1);

  document.getElementById('cgpaResultGrid').innerHTML=`
    <div class="result-box"><div class="result-num">${cgpa}</div><div class="result-label">CGPA</div></div>
    <div class="result-box orange"><div class="result-num">${pct}%</div><div class="result-label">Percentage</div></div>
    <div class="result-box ${totalBacklogs>0?'red':'green'}"><div class="result-num">${totalBacklogs}</div><div class="result-label">Total Backlogs</div></div>
    <div class="result-box" style="background:linear-gradient(135deg,#7c3aed,#5b21b6)"><div class="result-num">${sems.length}</div><div class="result-label">Semesters</div></div>
  `;
  const elig=document.getElementById('cgpaElig');
  elig.innerHTML=`<p style="font-weight:700;margin-bottom:10px;font-family:Baloo 2,cursive;">Semester-wise SGPA: ${semSgpas.map((s,i)=>`<span style="background:var(--p);color:white;padding:3px 10px;border-radius:20px;margin:2px;display:inline-block;font-size:13px">S${i+1}: ${s}</span>`).join('')}</p>`;
  [
    {label:'TCS/Wipro Placement (CGPA ≥ 6.5)',ok:cgpa>=6.5},
    {label:'Infosys Placement (CGPA ≥ 6.0)',ok:cgpa>=6.0},
    {label:'PMS Scholarship (No backlog)',ok:totalBacklogs===0},
    {label:'Merit Scholarship (CGPA ≥ 8.0)',ok:cgpa>=8.0},
    {label:'Distinction (CGPA ≥ 7.5)',ok:cgpa>=7.5},
    {label:'First Class (CGPA ≥ 6.5)',ok:cgpa>=6.5},
  ].forEach(e=>{
    elig.innerHTML+=`<div class="elig-item ${e.ok?'pass':'fail'}">${e.ok?'✅':'❌'} ${e.label}</div>`;
  });
  document.getElementById('cgpaResult').style.display='block';
}

function convertCgpa(){
  const v=parseFloat(document.getElementById('cgpaInput').value);
  if(v&&v>=0&&v<=10){
    const pct=((v-0.75)*10).toFixed(2);
    document.getElementById('cgpaToPercent').textContent=`→ ${pct}%`;
  } else document.getElementById('cgpaToPercent').textContent='';
}

function convertPercent(){
  const v=parseFloat(document.getElementById('percentInput').value);
  if(v&&v>=0&&v<=100){
    const cgpa=((v/10)+0.75).toFixed(2);
    document.getElementById('percentToCgpa').textContent=`→ ${cgpa} CGPA`;
  } else document.getElementById('percentToCgpa').textContent='';
}

initSemesters();
</script>
</body>
</html>
